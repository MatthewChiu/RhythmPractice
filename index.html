<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Practice Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .controls-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background-color: white;
            font-size: 1rem;
        }

        input[type="range"] {
            cursor: pointer;
            padding: 0;
        }

        .val-display {
            font-weight: bold;
            color: var(--primary);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button.active {
            background-color: #dc2626;
        }

        button.active:hover {
            background-color: #b91c1c;
        }

        /* Rhythm Display area */
        .rhythm-display-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: auto; /* Fallback scrolling for very small mobile screens */
        }

        #rhythm-score {
            width: 100%;
            max-width: 820px; /* Aligns with system dimensions */
            display: flex;
            justify-content: center;
        }

        .tempo-display {
            font-size: 1.2rem;
            font-weight: 700;
            color: #475569;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Rhythm Practice Generator</h1>
        <p>Dynamic Sheet Music Generation with VexFlow</p>
    </header>

    <main>
        <section class="controls-card">
            <div class="control-group">
                <label for="meter-select">Meter</label>
                <select id="meter-select">
                    <option value="2/4">2/4</option>
                    <option value="3/4">3/4</option>
                    <option value="4/4" selected>4/4</option>
                </select>
            </div>

            <div class="control-group">
                <label for="measure-count">Measures: <span id="measure-count-val" class="val-display">4</span></label>
                <input type="range" id="measure-count" min="1" max="16" value="4">
            </div>

            <div class="control-group">
                <label for="difficulty">Difficulty: <span id="difficulty-val" class="val-display">Medium</span></label>
                <input type="range" id="difficulty" min="1" max="3" value="2">
            </div>
        </section>

        <div style="text-align: center; margin-bottom: 1.5rem;">
            <button id="btn-generate" style="background-color: #10b981; font-size: 1.2rem;">🎲 Generate New Rhythm</button>
        </div>

        <section class="rhythm-display-container">
            <div id="rhythm-score"></div>
            <div class="tempo-display" id="tempo-output">Tempo: -- BPM</div>
        </section>

        <section class="action-buttons">
            <button id="btn-metronome">🔊 Metronome Off</button>
            <button id="btn-hear">▶️ Hear It</button>
        </section>
    </main>

    <script>
        // --- 1. Define Rhythmic Cells ---
        const oneBeatCells = [
            {
                name: "Quarter Note",
                beats: 1.0,
                durations: [1.0],
                vfNotes: ["q"]
            },
            {
                name: "Two Eighths",
                beats: 1.0,
                durations: [0.5, 0.5],
                vfNotes: ["8", "8"],
                beam: true
            },
            {
                name: "Four Sixteenths",
                beats: 1.0,
                durations: [0.25, 0.25, 0.25, 0.25],
                vfNotes: ["16", "16", "16", "16"],
                beam: true
            },
            {
                name: "Eighth + Two Sixteenths",
                beats: 1.0,
                durations: [0.5, 0.25, 0.25],
                vfNotes: ["8", "16", "16"],
                beam: true
            },
            {
                name: "Two Sixteenths + Eighth",
                beats: 1.0,
                durations: [0.25, 0.25, 0.5],
                vfNotes: ["16", "16", "8"],
                beam: true
            },
            {
                name: "Syncopation",
                beats: 1.0,
                durations: [0.25, 0.5, 0.25],
                vfNotes: ["16", "8", "16"],
                beam: true
            }
        ];

        const twoBeatCells = [
            {
                name: "Half Note",
                beats: 2.0,
                durations: [2.0],
                vfNotes: ["h"]
            },
            {
                name: "Two Quarters",
                beats: 2.0,
                durations: [1.0, 1.0],
                vfNotes: ["q", "q"]
            },
            {
                name: "Quarter + Two Eighths",
                beats: 2.0,
                durations: [1.0, 0.5, 0.5],
                vfNotes: ["q", "8", "8"],
                beamLastTwo: true
            },
            {
                name: "Two Eighths + Quarter",
                beats: 2.0,
                durations: [0.5, 0.5, 1.0],
                vfNotes: ["8", "8", "q"],
                beamFirstTwo: true
            }
        ];

        // --- 2. State ---
        let measuresData = []; 
        let currentBPM = 100;
        let audioCtx = null;
        let isMetronomePlaying = false;
        let isHearPlaying = false;
        let metronomeIntervalId = null;
        let playbackTimeoutIds = [];

        // --- 3. DOM Elements ---
        const selectMeter = document.getElementById('meter-select');
        const sliderMeasureCount = document.getElementById('measure-count');
        const valMeasureCount = document.getElementById('measure-count-val');
        const sliderDifficulty = document.getElementById('difficulty');
        const valDifficulty = document.getElementById('difficulty-val');
        
        const btnGenerate = document.getElementById('btn-generate');
        const btnMetronome = document.getElementById('btn-metronome');
        const btnHear = document.getElementById('btn-hear');
        const outputTempo = document.getElementById('tempo-output');
        const scoreDiv = document.getElementById('rhythm-score');

        // --- 4. Event Listeners ---
        sliderMeasureCount.addEventListener('input', (e) => {
            valMeasureCount.textContent = e.target.value;
        });

        sliderDifficulty.addEventListener('input', (e) => {
            const diffs = ["Easy (60-90 BPM)", "Medium (90-130 BPM)", "Hard (130-180 BPM)"];
            valDifficulty.textContent = diffs[e.target.value - 1];
        });

        btnGenerate.addEventListener('click', generateRhythm);
        btnMetronome.addEventListener('click', toggleMetronome);
        btnHear.addEventListener('click', playRhythm);
        selectMeter.addEventListener('change', generateRhythm);

        // --- 5. Generate Rhythm Sequence ---
        function generateRhythm() {
            stopAllAudio();

            const meter = selectMeter.value; 
            const beatsPerMeasure = parseInt(meter.split('/')[0]); 
            const numMeasures = parseInt(sliderMeasureCount.value);
            const difficulty = parseInt(sliderDifficulty.value);

            let minTempo = 60, maxTempo = 90;
            if (difficulty === 2) { minTempo = 90; maxTempo = 130; }
            else if (difficulty === 3) { minTempo = 130; maxTempo = 180; }
            currentBPM = Math.floor(Math.random() * (maxTempo - minTempo + 1)) + minTempo;
            outputTempo.textContent = `Tempo: ${currentBPM} BPM`;

            measuresData = [];

            for (let m = 0; m < numMeasures; m++) {
                let beatsLeft = beatsPerMeasure;
                let measureCells = [];

                while (beatsLeft > 0) {
                    let availableCells = [];
                    if (beatsLeft >= 2) {
                        availableCells = [...oneBeatCells, ...twoBeatCells];
                    } else {
                        availableCells = [...oneBeatCells];
                    }

                    const selectedCell = availableCells[Math.floor(Math.random() * availableCells.length)];
                    measureCells.push(selectedCell);
                    beatsLeft -= selectedCell.beats;
                }
                measuresData.push(measureCells);
            }

            renderSheetMusic(meter);
        }

        // --- 6. Advanced Wrap-to-Fit Multi-System Renderer ---
        function renderSheetMusic(meter) {
            scoreDiv.innerHTML = ""; // Clear existing SVG

            const beatsPerMeasure = parseInt(meter.split('/')[0]);
            
            // Layout Calculations
            const maxMeasuresPerLine = 4; 
            const systemWidth = 800; // Fixed canvas width fits standard browser viewports nicely
            const systemHeight = 110; 
            const totalMeasures = measuresData.length;
            const numLines = Math.ceil(totalMeasures / maxMeasuresPerLine);
            const totalHeight = numLines * systemHeight + 20;

            try {
                // Initialize VexFlow Factory
                const vf = new Vex.Flow.Factory({
                    renderer: { elementId: 'rhythm-score', width: systemWidth, height: totalHeight }
                });

                for (let lineIndex = 0; lineIndex < numLines; lineIndex++) {
                    const startIdx = lineIndex * maxMeasuresPerLine;
                    const endIdx = Math.min(startIdx + maxMeasuresPerLine, totalMeasures);
                    const measuresInThisLine = endIdx - startIdx;
                    
                    const yPosition = 10 + (lineIndex * systemHeight);

                    // Compute dynamic widths for staves on this system row
                    const isFirstSystemLine = (lineIndex === 0);
                    const firstStaveBonusWidth = 50; // extra space for clef & time signature
                    
                    let remainingWidth = systemWidth - 20; // 10px margin left/right
                    if (isFirstSystemLine) remainingWidth -= firstStaveBonusWidth;

                    const standardStaveWidth = Math.floor(remainingWidth / measuresInThisLine);

                    let currentX = 10;

                    for (let m = startIdx; m < endIdx; m++) {
                        const measureCells = measuresData[m];
                        const isFirstOfLine = (m === startIdx);
                        const isAbsoluteLast = (m === totalMeasures - 1);

                        // Calculate exact width for this measure
                        let staveWidth = standardStaveWidth;
                        if (isFirstSystemLine && isFirstOfLine) {
                            staveWidth += firstStaveBonusWidth;
                        }

                        // Create Stave
                        const stave = vf.Stave({ x: currentX, y: yPosition, width: staveWidth });
                        
                        // Add elements based on position
                        if (isFirstSystemLine && isFirstOfLine) {
                            stave.addClef("percussion").addTimeSignature(meter);
                        } else if (isFirstOfLine) {
                            // Sub-systems get clef repeated for readability
                            stave.addClef("percussion");
                        }
                        
                        if (isAbsoluteLast) {
                            stave.setEndBarline(Vex.Flow.Barline.type.DOUBLE);
                        }

                        // Process notes and beams
                        const vfNotes = [];
                        const beams = [];

                        measureCells.forEach((cell) => {
                            const cellNotes = cell.vfNotes.map(dur => {
                                return vf.StaveNote({
                                    keys: ["b/4"], // Middle line percussion notehead
                                    duration: dur,
                                    clef: "percussion"
                                });
                            });

                            vfNotes.push(...cellNotes);

                            if (cell.beam && cellNotes.length > 1) {
                                beams.push(vf.Beam({ notes: cellNotes }));
                            } else if (cell.beamLastTwo && cellNotes.length === 3) {
                                beams.push(vf.Beam({ notes: cellNotes.slice(1, 3) }));
                            } else if (cell.beamFirstTwo && cellNotes.length === 3) {
                                beams.push(vf.Beam({ notes: cellNotes.slice(0, 2) }));
                            }
                        });

                        // Format voice
                        const voice = vf.Voice({ num_beats: beatsPerMeasure, beat_value: 4 }).setStrict(false);
                        voice.addTickables(vfNotes);

                        // Calculate layout format bounds safely
                        const leftMarginAllowance = (isFirstOfLine && (isFirstSystemLine || lineIndex > 0)) ? 65 : 15;
                        const formatWidth = staveWidth - leftMarginAllowance - 15;

                        vf.Formatter().joinVoices([voice]).format([voice], formatWidth);
                        
                        stave.setContext(vf.getContext()).draw();
                        voice.draw(vf.getContext(), stave);
                        beams.forEach(b => b.setContext(vf.getContext()).draw());

                        currentX += staveWidth;
                    }
                }

            } catch (error) {
                console.error("VexFlow Multi-Line Rendering Error: ", error);
            }
        }

        // --- 7. Web Audio Helper ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(pitch, duration, time) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(pitch, time);

            gain.gain.setValueAtTime(0.2, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + duration);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(time);
            osc.stop(time + duration);
        }

        // --- 8. Metronome & Rhythm Playback Engine ---
        function toggleMetronome() {
            initAudio();
            if (isMetronomePlaying) {
                stopMetronome();
            } else {
                stopAllAudio();
                isMetronomePlaying = true;
                btnMetronome.textContent = "🛑 Stop Metronome";
                btnMetronome.classList.add('active');

                const beatDuration = 60 / currentBPM;
                let nextBeatTime = audioCtx.currentTime;

                function scheduleBeats() {
                    while (nextBeatTime < audioCtx.currentTime + 0.1) {
                        playSound(1000, 0.05, nextBeatTime);
                        nextBeatTime += beatDuration;
                    }
                    if (isMetronomePlaying) {
                        metronomeIntervalId = setTimeout(scheduleBeats, 25);
                    }
                }
                scheduleBeats();
            }
        }

        function stopMetronome() {
            isMetronomePlaying = false;
            clearTimeout(metronomeIntervalId);
            btnMetronome.textContent = "🔊 Metronome Off";
            btnMetronome.classList.remove('active');
        }

        function playRhythm() {
            initAudio();
            if (isHearPlaying) {
                stopHear();
                return;
            }

            stopAllAudio();
            isHearPlaying = true;
            btnHear.textContent = "🛑 Stop Rhythm";
            btnHear.classList.add('active');

            const beatDuration = 60 / currentBPM;
            let currentPlaybackTime = audioCtx.currentTime + 0.5;

            measuresData.forEach((measure) => {
                measure.forEach((cell) => {
                    cell.durations.forEach((noteVal) => {
                        playSound(750, 0.12, currentPlaybackTime);
                        currentPlaybackTime += noteVal * beatDuration;
                    });
                });
            });

            const totalDurationMs = (currentPlaybackTime - audioCtx.currentTime) * 1000;
            const timeoutId = setTimeout(() => {
                stopHear();
            }, totalDurationMs);
            playbackTimeoutIds.push(timeoutId);
        }

        function stopHear() {
            isHearPlaying = false;
            playbackTimeoutIds.forEach(id => clearTimeout(id));
            playbackTimeoutIds = [];
            btnHear.textContent = "▶️ Hear It";
            btnHear.classList.remove('active');
        }

        function stopAllAudio() {
            stopMetronome();
            stopHear();
        }

        // --- 9. Bootstrap Start State ---
        const diffs = ["Easy (60-90 BPM)", "Medium (90-130 BPM)", "Hard (130-180 BPM)"];
        valDifficulty.textContent = diffs[sliderDifficulty.value - 1];
        generateRhythm();
    </script>
</body>
</html>
